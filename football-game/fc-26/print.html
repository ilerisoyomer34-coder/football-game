<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>FC Pitch 3D — Match</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700&family=Archivo:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #8fd3ff; font-family: 'Archivo', system-ui, sans-serif; user-select: none; }
  #c { display: block; width: 100vw; height: 100vh; }

  /* ---------- HUD ---------- */
  .hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

  /* scoreboard top-left */
  .scoreboard {
    position: absolute; top: 18px; left: 18px; display: flex; align-items: stretch;
    height: 46px; border-radius: 11px; overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,.28); font-family: 'Saira Condensed', sans-serif;
    backdrop-filter: blur(4px);
  }
  .sb-team { display: flex; align-items: center; gap: 8px; padding: 0 12px; color: #fff; font-weight: 700; font-size: 22px; letter-spacing: .5px; }
  .sb-team.home { background: linear-gradient(180deg, #ff3b50, #e8233a); }
  .sb-team.away { background: linear-gradient(180deg, #3a7bff, #2255ee); }
  .crest { width: 18px; height: 22px; border-radius: 3px 3px 9px 9px; background: rgba(255,255,255,.85); box-shadow: inset 0 0 0 2px rgba(0,0,0,.15); }
  .sb-score { display: flex; align-items: center; gap: 10px; padding: 0 16px; background: #11151c; color: #fff; font-size: 28px; font-weight: 700; }
  .sb-score .dash { opacity: .5; font-size: 20px; }
  .sb-clock { display: flex; align-items: center; gap: 7px; padding: 0 14px; background: #1b2129; color: #ffd23f; font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  .live { width: 8px; height: 8px; border-radius: 50%; background: #ff3b50; box-shadow: 0 0 8px #ff3b50; animation: blink 1.4s infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  .matchday { position: absolute; top: 68px; left: 20px; color: #fff; font-family: 'Saira Condensed'; font-size: 13px; font-weight: 600; letter-spacing: 2px; text-shadow: 0 2px 6px rgba(0,0,0,.4); opacity: .9; }

  /* radar — lower-left, above the joystick */
  .radar-wrap { position: absolute; bottom: 170px; left: 18px; padding: 6px; background: rgba(12,18,28,.55); border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,.3); }
  #radar { display: block; border-radius: 8px; }
  .radar-lbl { color: #fff; font-family: 'Saira Condensed'; font-size: 11px; letter-spacing: 2px; text-align: center; margin-top: 3px; opacity: .8; }

  /* shot power meter (center-bottom) */
  .power-wrap { position: absolute; bottom: 92px; left: 50%; transform: translateX(-50%); width: 240px; opacity: 0; transition: opacity .12s; }
  .power-wrap.show { opacity: 1; }
  .power-lbl { color: #fff; font-family: 'Saira Condensed'; font-size: 13px; letter-spacing: 3px; text-align: center; margin-bottom: 5px; text-shadow: 0 2px 6px rgba(0,0,0,.5); }
  .power-bar { height: 14px; border-radius: 8px; background: rgba(0,0,0,.45); overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,.5); }
  #powerFill { height: 100%; width: 0%; border-radius: 8px; background: linear-gradient(90deg, #4cd964, #ffd23f 55%, #ff3b50); transition: width .05s linear; }

  /* floating player name tag */
  .name-tag { position: absolute; display: none; align-items: center; gap: 6px; transform: translate(-50%, -120%); pointer-events: none;
    background: rgba(17,21,28,.82); padding: 4px 10px 4px 4px; border-radius: 20px; box-shadow: 0 4px 14px rgba(0,0,0,.35); }
  .name-tag .num { background: #ffd23f; color: #11151c; font-family: 'Saira Condensed'; font-weight: 700; font-size: 15px; min-width: 24px; height: 24px; border-radius: 14px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
  .name-tag .nm { color: #fff; font-family: 'Saira Condensed'; font-weight: 700; font-size: 16px; letter-spacing: .6px; }

  /* GOAL flash */
  .goal-flash { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Saira Condensed'; font-weight: 700; font-size: 16vw; color: #fff; -webkit-text-stroke: 3px #11151c; text-shadow: 0 10px 40px rgba(0,0,0,.4); opacity: 0; transform: scale(.6); transition: all .35s cubic-bezier(.2,1.4,.4,1); letter-spacing: 4px; }
  .goal-flash.show { opacity: 1; transform: scale(1); }

  /* ---------- on-screen controls ---------- */
  .controls { pointer-events: none; }
  .joy { position: absolute; bottom: 28px; left: 24px; width: 130px; height: 130px; border-radius: 50%; background: rgba(255,255,255,.14); border: 2px solid rgba(255,255,255,.35); pointer-events: auto; touch-action: none; box-shadow: 0 6px 18px rgba(0,0,0,.2); }
  .joy-knob { position: absolute; top: 50%; left: 50%; width: 58px; height: 58px; margin: -29px 0 0 -29px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #fff, #d7dee8); box-shadow: 0 4px 10px rgba(0,0,0,.3); }
  .btns { position: absolute; bottom: 24px; right: 24px; display: grid; grid-template-columns: 70px 70px; grid-auto-rows: 70px; gap: 11px; pointer-events: none; }
  .btn { pointer-events: auto; touch-action: none; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-family: 'Saira Condensed'; font-weight: 700; font-size: 15px; letter-spacing: .3px; box-shadow: 0 6px 16px rgba(0,0,0,.28); border: 2px solid rgba(255,255,255,.35); transition: transform .06s; cursor: pointer; text-align: center; line-height: 1; }
  .btn:active { transform: scale(.92); }
  .btn small { font-size: 9px; opacity: .8; letter-spacing: 1px; margin-top: 2px; }
  #btnThrough { grid-column: 1; grid-row: 1; background: linear-gradient(180deg,#3fe0c4,#16b89a); color:#063b32; }
  #btnShoot { grid-column: 2; grid-row: 1; background: linear-gradient(180deg,#ff5a6a,#e8233a); }
  #btnPass { grid-column: 1; grid-row: 2; background: linear-gradient(180deg,#5bc6ff,#2288ee); }
  #btnSlide { grid-column: 2; grid-row: 2; background: linear-gradient(180deg,#ffa14d,#f57a1b); }
  #btnSprint { grid-column: 1 / span 2; grid-row: 3; border-radius: 36px; background: linear-gradient(180deg,#ffe06b,#f5b400); color:#11151c; }

  .help { position: absolute; top: 18px; right: 18px; text-align: right; color: #fff; font-size: 12px; line-height: 1.55; font-family: 'Saira Condensed'; letter-spacing: .8px; text-shadow: 0 2px 6px rgba(0,0,0,.45); background: rgba(12,18,28,.4); padding: 8px 12px; border-radius: 10px; }
  .help b { color: #ffd23f; }
  @media (max-width: 720px) { .help { display: none; } .joy { transform: translateX(0); left: 26px; } }

  /* loading / error overlay */
  #loading { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; background: linear-gradient(160deg,#1b9c4b,#0f7a39); color: #fff; font-family: 'Saira Condensed', sans-serif; }
  #loading .ball { width: 46px; height: 46px; border-radius: 50%; background: #fff; box-shadow: inset -6px -6px 0 rgba(0,0,0,.12), 0 6px 16px rgba(0,0,0,.3); animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .ldt { font-size: 20px; letter-spacing: 3px; opacity: .95; }
  #loading .err { display: none; max-width: 320px; text-align: center; font-size: 16px; line-height: 1.5; letter-spacing: 1px; }
  #loading.failed .ball, #loading.failed .ldt { display: none; }
  #loading.failed .err { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="hud">
  <div class="scoreboard">
    <div class="sb-team home"><span class="crest"></span>ATL</div>
    <div class="sb-score"><span id="scH">0</span><span class="dash">–</span><span id="scA">0</span></div>
    <div class="sb-team away">NOV<span class="crest"></span></div>
    <div class="sb-clock"><span class="live"></span><span id="clock">00:00</span></div>
  </div>
  <div class="matchday">MATCHDAY 12 · AURORA STADIUM</div>

  <div class="help">
    <b>WASD</b> hareket · <b>Shift</b> koşu<br />
    <b>J</b> pas · <b>L</b> ara pas<br />
    <b>K</b>/Boşluk şut (basılı tut)<br />
    <b>C</b> kayma
  </div>

  <div class="radar-wrap">
    <canvas id="radar" width="184" height="120"></canvas>
    <div class="radar-lbl">RADAR</div>
  </div>

  <div class="power-wrap" id="powerWrap">
    <div class="power-lbl">SHOT POWER</div>
    <div class="power-bar"><div id="powerFill"></div></div>
  </div>

  <div class="name-tag" id="nameTag"><span class="num">10</span><span class="nm">PLAYER</span></div>

  <div class="goal-flash" id="goalFlash">GOAL!</div>
</div>

<div id="loading">
  <div class="ball"></div>
  <div class="ldt">SAHA YÜKLENİYOR…</div>
  <div class="err">3B motor yüklenemedi.<br />İnternet bağlantını kontrol edip sayfayı yenile.</div>
</div>

<div class="controls">
  <div class="joy" id="joy"><div class="joy-knob" id="joyKnob"></div></div>
  <div class="btns">
    <div class="btn" id="btnThrough">ARA<small>PAS</small></div>
    <div class="btn" id="btnShoot">ŞUT<small>BASILI</small></div>
    <div class="btn" id="btnPass">PAS</div>
    <div class="btn" id="btnSlide">KAYMA</div>
    <div class="btn" id="btnSprint">KOŞU</div>
  </div>
</div>

<script src="render.js"></script>
<script src="game.js"></script>
<script>
(async () => {
  // Prepend so page-supplied @page / break rules (deck-stage's margin:0,
  // author CSS) keep source-order precedence over the baseline.
  const baseCss = document.createElement('style');
  baseCss.textContent = "@media print {\n  @page { margin: 0.5cm; }\n  html, body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }\n  section, article, figure, table { break-inside: avoid; }\n  *, *::before, *::after {\n    animation-delay: -99s !important; animation-duration: .001s !important;\n    animation-iteration-count: 1 !important; animation-fill-mode: both !important;\n    animation-play-state: running !important; transition-duration: 0s !important;\n  }\n}";
  document.head.prepend(baseCss);
  if (document.readyState === 'loading') {
    await new Promise((r) => document.addEventListener('DOMContentLoaded', r, { once: true }));
  }
  let ds = document.querySelector('deck-stage');
  // whenDefined never resolves when nothing registers the element, so only
  // await it when a <deck-stage> tag exists (and race a timeout regardless).
  if (ds && !customElements.get('deck-stage')) {
    try {
      await Promise.race([
        customElements.whenDefined('deck-stage'),
        new Promise((r) => setTimeout(r, 3000)),
      ]);
    } catch (e) {}
    ds = document.querySelector('deck-stage');
  }
  // dc-runtime assigns window.DCLogic at init and mounts into #dc-root on
  // DOMContentLoaded; settle on that subtree so React has rendered before
  // print(). Non-DC pages fall through to weighing body.
  const isDc = !ds && 'DCLogic' in window;
  const settleRoot = ds || (isDc ? document.getElementById('dc-root') : null) || document.body;
  if (settleRoot) {
    // Weigh only content children — skip script/style/template so inline
    // Babel/CSS doesn't register as stable "content" before the framework
    // has mounted anything.
    const MEDIA = 'img,svg,canvas,video,picture,iframe,embed,object';
    const weigh = () => {
      let text = 0, media = 0;
      for (const c of settleRoot.children) {
        const t = c.tagName;
        if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
        text += (c.textContent || '').trim().length;
        media += c.querySelectorAll(MEDIA).length + (c.matches(MEDIA) ? 1 : 0);
      }
      return text + media * 100;
    };
    // "Non-zero and stable" alone is not sufficient to mean rendered: generic
    // body can carry a static shell while async main content is pending, and
    // #dc-root can carry the root DC's static text while child refs are still
    // .sc-placeholder boxes. Gate generic on readyState 'complete', and never
    // accept stability while a dc-runtime placeholder is present.
    const isGeneric = settleRoot === document.body;
    const deadline = Date.now() + 15000;
    let last = -1, stable = 0;
    while (Date.now() < deadline) {
      const n = weigh();
      const ready =
        (!isGeneric || document.readyState === 'complete') &&
        !settleRoot.querySelector('.sc-placeholder');
      if (n > 0 && n === last && ready) { if (++stable >= 2) break; } else { stable = 0; }
      last = n;
      await new Promise((r) => setTimeout(r, 250));
    }
  }
  try { await document.fonts.ready; } catch (e) {}
  // Jump every animation to its end state so print() never captures a slide
  // mid-entrance. Ordering matters: the 0s-transition style must be live
  // BEFORE data-deck-active is set so attribute-keyed transitions don't
  // start a (now-0s) run from the pre-active base.
  const st = document.createElement('style');
  st.textContent = '*,*::before,*::after{animation-delay:-99s !important;animation-duration:.001s !important;animation-iteration-count:1 !important;animation-fill-mode:both !important;animation-play-state:running !important;transition-duration:0s !important}';
  document.head.appendChild(st);
  for (const d of document.querySelectorAll('deck-stage')) {
    for (const c of d.children) {
      const t = c.tagName;
      if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
      c.setAttribute('data-deck-active', '');
    }
  }
  try {
    const sweep = () => {
      for (const a of document.getAnimations()) {
        try { a.finish(); } catch (e) {
          try { a.currentTime = (a.effect && a.effect.getComputedTiming().duration) || 0; a.pause(); } catch (e2) {}
        }
      }
    };
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
  } catch (e) {}
  setTimeout(() => { try { window.print(); } catch (e) {} }, 200);
})();
</script>
</body>
</html>
